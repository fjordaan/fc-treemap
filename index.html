<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1D4556">
  <title>Fulham Cemetery Tree Map</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: sans-serif; }
    #map { height: 100vh; height: 100dvh; width: 100%; }
    .leaflet-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }

    #panel-toggle {
      position: absolute;
      top: 10px;
      right: 280px;   /* just left of the 270px panel + 10px gap */
      z-index: 1001;
      background: white;
      border: 2px solid rgba(0,0,0,0.25);
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3);
      user-select: none;
      transition: right 0.15s;
    }
    #panel-toggle:hover { background: #f4f4f4; }
    #panel-toggle.collapsed { right: 10px; }

    @media (max-width: 767px) {
      #panel-toggle {
        top: auto;
        bottom: max(16px, env(safe-area-inset-bottom));
        right: 10px;
        transition: none;
      }
      #panel-toggle.collapsed { right: 10px; }
    }

    #panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      background: white;
      border-left: 2px solid rgba(0,0,0,0.18);
      padding: 12px;
      width: 270px;
      overflow-y: auto;
      box-shadow: -2px 0 8px rgba(0,0,0,0.15);
      display: none;
    }
    #panel.open { display: block; }

    #panel-header {
      position: sticky;
      top: -12px;       /* cancel panel's 12px padding so it sticks flush to the top edge */
      margin: -12px -12px 12px;
      padding: 10px 12px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1;
    }
    #tree-count {
      font-size: 12px;
      color: #555;
      font-weight: bold;
    }
    #filter-reset {
      font-size: 12px;
      color: #2a7ae2;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
    }
    #filter-reset:hover { color: #1a5ab8; }
    #filter-share {
      background: none; border: none; padding: 0; cursor: pointer;
      color: #2a7ae2; display: flex; align-items: center;
    }
    #filter-share:hover { color: #1a5ab8; }

    #map.add-mode { cursor: crosshair; }

    #map-dim {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.25);
      cursor: pointer;
    }
    @media (max-width: 767px) {
      #map-dim.active { display: block; }
    }

    #btn-add {
      font-size: 12px;
      cursor: pointer;
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      box-sizing: border-box;
    }
    #btn-add:hover  { background: #e8e8e8; }
    #btn-add.active { background: #fdecea; border-color: #c0392b; color: #c0392b; }

    #add-toast {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #add-toast.show { opacity: 1; }

    #hover-label {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px 16px;
      text-align: center;
      pointer-events: none;
      z-index: 2000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      white-space: nowrap;
    }
    #hover-label.visible { display: block; }
    #hover-label .lbl-sci { display: block; font-size: 16px; font-style: italic; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
    #hover-label .lbl-com { display: block; font-size: 13px; color: #555; line-height: 1.4; }
    @media (max-width: 767px) { #hover-label { display: none !important; } }

    .section-label {
      background: none;
      border: none;
      font-size: 11px;
      font-weight: bold;
      color: rgba(0,0,0,0.55);
      white-space: nowrap;
      text-shadow: 0 0 3px white, 0 0 3px white;
      pointer-events: none;
    }

    .filter-section { margin-bottom: 12px; }
    .filter-section > .filter-label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #777;
      margin-bottom: 4px;
    }
    .filter-section select {
      width: 100%;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: white;
    }

    .checkbox-group {
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      padding: 4px 6px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 2px 0;
      cursor: pointer;
      color: #333;
    }
    .checkbox-item input { cursor: pointer; flex-shrink: 0; }


    .month-grid { display: grid; grid-template-columns: repeat(12, 1fr); margin-top: 4px; }
    .month-btn {
      display: flex; align-items: center; justify-content: center;
      height: 24px; font-size: 11px; font-weight: 600; cursor: pointer;
      border: 1px solid #ddd; border-radius: 0; background: white;
      margin-left: -1px; user-select: none; color: #555;
    }
    .month-btn:first-child { margin-left: 0; border-radius: 3px 0 0 3px; }
    .month-btn:last-child  { border-radius: 0 3px 3px 0; }
    .month-btn:hover { background: #e8e8e8; }
    .month-btn.current { border-color: #2a7ae2; color: #2a7ae2; z-index: 1; }
    .month-btn.selected { background: #2a7ae2; border-color: #2a7ae2; color: white; z-index: 1; }
    .month-btn.selected.current { background: #1a5ab8; border-color: #1a5ab8; }
    .month-btn input { display: none; }


    /* Tree labels (permanent tooltips shown at high zoom) */
    .tree-label {
      background: none; border: none; box-shadow: none; padding: 0;
      pointer-events: none; white-space: nowrap;
    }
    .tree-label::before { display: none; }
    .tree-label .lbl-sci { display: block; font-size: 12px; font-style: italic; font-weight: 600; color: #1a1a1a; text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white; line-height: 1.3; }
    .tree-label .lbl-com { display: block; font-size: 10px; color: #444; text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white; line-height: 1.3; }

    /* Popup styles */
    .tree-popup { font-size: 13px; line-height: 1.65; min-width: 180px; }
    .tree-popup h4 { font-size: 16px; margin-bottom: 6px; font-style: italic; color: #1a1a1a; }
    .tree-popup .prop { color: #555; margin: 8px 0; line-height: 1.2; }
    .tree-popup .prop b { color: #1a1a1a; font-weight: 600; }
    .tree-popup .prop span { user-select: all; }
    .tree-popup .links { margin-top: 8px; font-size: 12px; border-top: 1px solid #eee; padding-top: 6px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .tree-popup .links > span, .tree-popup .links .feedback-link { white-space: nowrap; }
    .tree-popup .links a { color: #2a7ae2; text-decoration: none; }
    .tree-popup .links a:hover { text-decoration: underline; }

    .feedback-form { display: none; margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; }
    .feedback-form.open { display: block; }
    .feedback-form textarea { width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 3px; padding: 4px 6px; font-size: 12px; resize: vertical; font-family: inherit; }

    #feedback-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 4000;
      background: rgba(0,0,0,0.4);
    }
    #feedback-backdrop.open { display: block; }
    #feedback-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4001;
      background: white;
      border-radius: 16px 16px 0 0;
      padding: 12px 16px max(20px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.3s ease;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    }
    #feedback-sheet.open { transform: translateY(0); }
    #feedback-sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 14px; }
    #feedback-sheet-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #1a1a1a; font-style: italic; }
    #feedback-sheet textarea { width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 16px; font-family: inherit; resize: none; }
    #feedback-sheet .feedback-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    #feedback-sheet .feedback-actions button { font-size: 13px; padding: 6px 16px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #f5f5f5; }
    #feedback-sheet .feedback-actions button:hover { background: #e8e8e8; }
    .feedback-form .feedback-actions { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .feedback-form button { font-size: 12px; padding: 3px 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: #f5f5f5; }
    .feedback-form button:hover { background: #e8e8e8; }
    .feedback-status { font-size: 11px; color: #555; }
    .tree-popup .photos { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
    .tree-popup .photos a { display: block; flex: 1 1 calc(50% - 4px); cursor: zoom-in; }
    .tree-popup .photos img { width: 100%; height: 100px; object-fit: cover; border-radius: 3px; display: block; }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 5000;
      background: rgba(0,0,0,0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 100%;
      max-height: calc(100dvh - 80px);
      object-fit: contain;
      display: block;
      border-radius: 2px;
    }
    @media (max-width: 767px) {
      #lightbox-img { cursor: zoom-in; }
      #lightbox-img.zoomed {
        height: 100dvh;
        max-height: 100dvh;
        width: auto;
        max-width: none;
        cursor: zoom-out;
      }
      #lightbox.zoomed { overflow-x: auto; justify-content: flex-start; }
    }
    #lightbox-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      width: 100%;
      justify-content: center;
      box-sizing: border-box;
    }
    @media (max-width: 767px) {
      #lightbox-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        background: linear-gradient(transparent, rgba(0,0,0,0.7));
      }
    }
    #lightbox-bar button, #lightbox-bar a {
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: white;
      font-size: 13px;
      padding: 5px 12px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    #lightbox-bar button:hover, #lightbox-bar a:hover { background: rgba(255,255,255,0.15); }
    #lightbox-bar .nav { font-size: 20px; padding: 3px 14px; }
    #lightbox-bar .nav:disabled { opacity: 0.25; cursor: default; }
    #lightbox-close-top {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    #lightbox-close-top:hover { color: white; }
    #lightbox-zoom-hint {
      display: none;
    }
    @media (max-width: 767px) {
      #lightbox-zoom-hint {
        display: block;
        position: absolute;
        top: 24px;
        left: 16px;
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        pointer-events: none;
      }
    }
    #lightbox-spinner {
      display: none;
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: lb-spin 0.7s linear infinite;
    }
    #lightbox.loading #lightbox-spinner { display: block; }
    #lightbox.loading #lightbox-img { opacity: 0; }
    @keyframes lb-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="map-dim" onclick="togglePanel()"></div>
  <div id="add-toast">Copied!</div>
  <div id="hover-label"></div>

  <button id="panel-toggle" onclick="togglePanel()">&#9658; Filters</button>

  <div id="panel">
    <div id="panel-header">
      <span style="display:flex;align-items:center;gap:6px">
        <span id="tree-count">Loading…</span>
        <button id="filter-share" onclick="copyFilterLink()" title="Copy link to current filters">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
      </span>
      <button id="filter-reset" onclick="resetFilters()">Reset</button>
    </div>

    <div class="filter-section">
      <span class="filter-label">Scientific name</span>
      <select id="filter-sci" onchange="applyFilters()">
        <option value="">All species</option>
      </select>
    </div>

    <div class="filter-section">
      <span class="filter-label">Common name</span>
      <select id="filter-common" onchange="applyFilters()">
        <option value="">All common names</option>
      </select>
    </div>

    <div class="filter-section">
      <span class="filter-label">Short name</span>
      <select id="filter-short" onchange="applyFilters()">
        <option value="">All short names</option>
      </select>
    </div>

    <div class="filter-section">
      <span class="filter-label">Seasonal interest</span>
      <div class="month-grid" id="filter-months"></div>
    </div>

    <div class="filter-section">
      <span class="filter-label">New trees</span>
      <div class="checkbox-group" id="filter-new-tags"></div>
    </div>

    <div class="filter-section">
      <span class="filter-label">Tags</span>
      <div class="checkbox-group" id="filter-tags"></div>
    </div>

    <div class="filter-section">
      <span class="filter-label">Condition</span>
      <div class="checkbox-group" id="filter-conditions"></div>
    </div>

    <div class="filter-section">
      <span class="filter-label">Form</span>
      <div class="checkbox-group" id="filter-forms"></div>
    </div>

    <div class="filter-section">
      <span class="filter-label">Other</span>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="filter-info" onchange="applyFilters()">
          Has info label
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="filter-photo" onchange="applyFilters()">
          Has photo
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="filter-no-photo" onchange="applyFilters()">
          Lacks photo
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="filter-show-labels" onchange="updateLabels()">
          Show labels when zoomed in
        </label>
      </div>
    </div>

    <div class="filter-section">
      <button id="btn-add" onclick="toggleAddMode()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
        Copy location coords
      </button>
    </div>
  </div>

  <div id="feedback-backdrop" onclick="closeFeedbackSheet()"></div>
  <div id="feedback-sheet">
    <div id="feedback-sheet-handle"></div>
    <div id="feedback-sheet-title"></div>
    <textarea rows="4" placeholder="Your comment about this tree…"></textarea>
    <div class="feedback-actions">
      <button onclick="submitFeedbackSheet()">Send</button>
      <span class="feedback-status"></span>
      <a id="feedback-sheet-mailto" href="#" style="margin-left:auto;font-size:11px;color:#2a7ae2;text-decoration:none;white-space:nowrap;">&#9993; Send email instead</a>
    </div>
  </div>

  <div id="lightbox" onclick="handleLightboxClick(event)">
    <button id="lightbox-close-top" onclick="closeLightbox()">&#x2715;</button>
    <div id="lightbox-zoom-hint">Tap photo to toggle zoom level</div>
    <div id="lightbox-spinner"></div>
    <img id="lightbox-img" src="" referrerpolicy="no-referrer" alt="Tree photo" onclick="toggleLightboxZoom(event)"
         onload="document.getElementById('lightbox').classList.remove('loading')"
         onerror="document.getElementById('lightbox').classList.remove('loading')"/>
    <div id="lightbox-bar">
      <button class="nav" id="lightbox-prev" onclick="stepLightbox(-1)">&#8249;</button>
      <a id="lightbox-open" href="" target="_blank" rel="noopener" referrerpolicy="no-referrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:5px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Open in new tab
      </a>
      <button class="nav" id="lightbox-next" onclick="stepLightbox(1)">&#8250;</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  // ── CSV PARSER ───────────────────────────────────────────────────────────────
  // Handles quoted fields (RFC 4180), CRLF and LF line endings.
  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { row.push(field); field = ''; }
        else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else if (ch !== '\r') { field += ch; }
      }
    }
    // Last row
    if (row.length || field) { row.push(field); rows.push(row); }
    return rows;
  }

  // ── COLOUR MAP ───────────────────────────────────────────────────────────────
  function hsl(h, s, l) { return `hsl(${h},${s}%,${l}%)`; }

  // Assigns a colour to every distinct scientific name.
  // Fixed genus groups get defined hues; remaining genera get evenly distributed
  // hues from ranges that don't clash with the fixed groups.
  function buildColourMap(trees) {
    const allNames = [...new Set(trees.map(t => t['Scientific name']).filter(Boolean))].sort();
    const colourMap = new Map();

    // Each entry: [matchFn, hue, saturation, lightnessMin, lightnessMax]
    // Multiple species within a group get evenly spaced lightness values.
    const groups = [
      // Sycamore — red
      [n => n === 'Acer pseudoplatanus',                                              0,   70, 40, 60],
      // Other maples — orange
      [n => /^Acer\b/.test(n) && n !== 'Acer pseudoplatanus',                        25,  80, 45, 68],
      // Cedrus — navy blue tints
      [n => /^Cedrus\b/.test(n),                                                      225, 65, 25, 45],
      // Other cedar family (Cryptomeria, Thuja) — brown
      [n => /^(Cryptomeria|Thuja)\b/.test(n),                                         25,  42, 30, 52],
      // Plane — yellow
      [n => /^Platanus\b/.test(n),                                                    55,  70, 45, 65],
      // Lime — light green
      [n => /^Tilia\b/.test(n),                                                       85,  55, 55, 70],
      // Hornbeam — mid green
      [n => /^Carpinus\b/.test(n),                                                    120, 50, 32, 50],
      // Cypress family — dark green
      [n => /^(Chamaecyparis|Cupressus|Hesperocyparis|x Hesperotropsis)\b/.test(n), 152,  55, 20, 42],
      // Crabapple — light blue
      [n => /^Malus\b/.test(n),                                                       205, 55, 58, 76],
      // Kanzan & Beni-yutaka cherry — pink
      [n => /^Prunus\b/.test(n) && /Kanzan|Beni-yutaka/.test(n),                    340,  68, 58, 65],
      // All other cherry/plum Prunus — light pink
      [n => /^Prunus\b/.test(n),                                                     340,  42, 74, 88],
    ];

    for (const [test, hue, sat, lMin, lMax] of groups) {
      const matching = allNames.filter(n => !colourMap.has(n) && test(n)).sort();
      matching.forEach((name, i) => {
        const l = matching.length === 1
          ? Math.round((lMin + lMax) / 2)
          : Math.round(lMin + (i / (matching.length - 1)) * (lMax - lMin));
        colourMap.set(name, hsl(hue, sat, l));
      });
    }

    // Everything else — distribute hues across gaps in the fixed colour wheel.
    // Avoid: 0-42 (reds/orange/brown), 50-90 (yellows/lime), 115-165 (greens),
    //        195-220 (light blue), 330-360 (pink).
    // Free ranges: [42,50], [90,115], [165,195], [220,330]
    const remaining = allNames.filter(n => !colourMap.has(n));
    const byGenus = {};
    for (const name of remaining) {
      const genus = name.split(' ')[0];
      if (!byGenus[genus]) byGenus[genus] = [];
      byGenus[genus].push(name);
    }
    const genera = Object.keys(byGenus).sort();
    const freeRanges = [[42, 50], [90, 115], [165, 195], [220, 330]];
    const totalFree = freeRanges.reduce((s, [a, b]) => s + b - a, 0);

    genera.forEach((genus, gi) => {
      const frac = genera.length > 1 ? gi / genera.length : 0.5;
      const target = frac * totalFree;
      let cum = 0, hue = 42;
      for (const [a, b] of freeRanges) {
        const size = b - a;
        if (target <= cum + size) { hue = a + (target - cum); break; }
        cum += size;
      }
      byGenus[genus].sort().forEach((name, si) => {
        const n = byGenus[genus].length;
        const l = n === 1 ? 48 : Math.round(38 + (si / (n - 1)) * 22);
        colourMap.set(name, hsl(Math.round(hue), 62, l));
      });
    });

    return colourMap;
  }

  // ── SVG ICONS ────────────────────────────────────────────────────────────────
  function svgTag(content, w = 24, h = 24) {
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${content}</svg>`;
  }

  function circleIcon(fill) {
    return svgTag(`<circle cx="12" cy="12" r="10" fill="${fill}" stroke="white" stroke-width="2"/>`);
  }

  function starIcon(fill) {
    // Circle background with a 5-pointed star inside
    const pts = [];
    for (let i = 0; i < 10; i++) {
      const r = i % 2 === 0 ? 7.5 : 3.2;
      const angle = (Math.PI * i / 5) - Math.PI / 2;
      pts.push(`${(12 + r * Math.cos(angle)).toFixed(2)},${(12 + r * Math.sin(angle)).toFixed(2)}`);
    }
    return svgTag(
      `<circle cx="12" cy="12" r="10" fill="${fill}" stroke="white" stroke-width="2"/>` +
      `<polygon points="${pts.join(' ')}" fill="white" opacity="0.9" stroke="none"/>`
    );
  }

  function diamondIcon(fill) {
    return svgTag(
      `<polygon points="12,2 22,12 12,22 2,12" fill="${fill}" stroke="white" stroke-width="2" stroke-linejoin="round"/>`
    );
  }

  function squareIcon(fill) {
    // Slightly smaller than the circle (which spans 2–22); square spans 4–20
    return svgTag(`<rect x="8" y="8" width="8" height="8" fill="${fill}" stroke="white" stroke-width="1.5"/>`);
  }

  function questionIcon() {
    return svgTag(
      `<circle cx="12" cy="12" r="10" fill="white" stroke="#aaa" stroke-width="2"/>` +
      `<text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#888" font-family="sans-serif">?</text>`
    );
  }

  // ── KML ICONS ────────────────────────────────────────────────────────────────
  function kmlDivIcon(svgContent, w = 24, h = 24) {
    return L.divIcon({ className: '', html: svgTag(svgContent, w, h), iconSize: [w, h], iconAnchor: [w/2, h/2] });
  }

  function buildingKmlIcon(color) {
    return kmlDivIcon(
      `<rect x="4" y="9" width="16" height="12" rx="0.5" fill="${color}"/>` +
      `<polygon points="2,9 12,2 22,9" fill="${color}"/>` +
      `<rect x="9" y="15" width="6" height="6" fill="rgba(255,255,255,0.7)"/>` +
      `<rect x="5" y="11" width="4" height="3" rx="0.5" fill="rgba(255,255,255,0.5)"/>` +
      `<rect x="15" y="11" width="4" height="3" rx="0.5" fill="rgba(255,255,255,0.5)"/>`
    );
  }

  function monumentKmlIcon(color) {
    return kmlDivIcon(
      `<rect x="10" y="2" width="4" height="16" rx="0.5" fill="${color}"/>` +
      `<rect x="5" y="7" width="14" height="4" rx="0.5" fill="${color}"/>` +
      `<rect x="8" y="18" width="8" height="3" rx="0.5" fill="${color}"/>`
    );
  }

  function tapKmlIcon(color) {
    return kmlDivIcon(
      `<g stroke="white" stroke-width="1.5" paint-order="stroke">` +
      // Handle: T-shape (crossbar + stem)
      `<rect x="5" y="2" width="12" height="2.5" rx="1.25" fill="${color}"/>` +
      `<rect x="9.5" y="1.5" width="3" height="4" rx="0.5" fill="${color}"/>` +
      // Body (vertical) + spout (horizontal right) + nozzle (downward at end)
      `<path d="M9.5 5 L12.5 5 L12.5 9.5 L21 9.5 L21 18 Q21 20 19.5 20 Q18 20 18 18 L18 12 L12.5 12 L12.5 21 Q12.5 22.5 11 22.5 Q9.5 22.5 9.5 21 Z" fill="${color}"/>` +
      `</g>`
    , 36, 36);
  }

  function benchKmlIcon() {
    return kmlDivIcon(
      `<g stroke="white" stroke-width="1.5" paint-order="stroke">` +
      `<rect x="3" y="9" width="18" height="3" rx="1" fill="#795548"/>` +
      `<rect x="3" y="14" width="18" height="2" rx="1" fill="#795548"/>` +
      `<rect x="4" y="12" width="2.5" height="5" rx="0.5" fill="#5D4037"/>` +
      `<rect x="17.5" y="12" width="2.5" height="5" rx="0.5" fill="#5D4037"/>` +
      `</g>`
    , 36, 36);
  }

  function kmlPointIcon(styleUrl) {
    if (/icon-1603-9C27B0|icon-1502-9C27B0/.test(styleUrl)) return buildingKmlIcon('#9C27B0');
    if (/icon-1599-9C27B0/.test(styleUrl))                   return monumentKmlIcon('#9C27B0');
    if (/icon-1703-0288D1/.test(styleUrl))                   return tapKmlIcon('#0288D1');
    if (/icon-1891-795548/.test(styleUrl))                   return benchKmlIcon();
    return kmlDivIcon(`<circle cx="12" cy="12" r="6" fill="#888" stroke="white" stroke-width="1.5"/>`);
  }

  function kmlLineColor(styleUrl) {
    return styleUrl.includes('795548') ? '#3B7A5C' : '#000000';
  }

  function makeIcon(tree, colour) {
    const tags = parseTags(tree['Tag']);
    const condition = (tree['Condition'] || '').trim();

    let svg, anchorY = 12;
    if (condition === 'Dead') {
      svg = squareIcon('#888888');
    } else if (tags.includes('TBC')) {
      svg = questionIcon();
    } else if (tags.includes('Highlight')) {
      svg = starIcon(colour);
    } else if (tags.some(isNewTag)) {
      svg = diamondIcon(colour);
    } else {
      svg = circleIcon(colour);
    }

    return L.divIcon({
      html: svg,
      className: '',           // suppress Leaflet's default white box
      iconSize: [24, 24],
      iconAnchor: [12, anchorY],
      popupAnchor: [0, -anchorY]
    });
  }

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  function parseTags(tagStr) {
    if (!tagStr) return [];
    return tagStr.split(',').map(t => t.trim()).filter(Boolean);
  }

  // Strip any existing size suffix (=w123-h456-s-no etc.) and query string,
  // then reapply the requested size parameter.
  function googlePhotoUrl(raw, size) {
    const base = raw.split('?')[0].replace(/=[^/=]+$/, '');
    return `${base}=${size}`;
  }

  function parsePhotos(photoStr) {
    if (!photoStr) return [];
    return photoStr.split(',').map(s => s.trim()).filter(Boolean);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function calcAge(tree) {
    const planted = parseInt(tree['Year planted']) || parseInt(tree['Est. year planted']) || null;
    if (!planted) return null;
    const endYear = parseInt(tree['Year died']) || new Date().getFullYear();
    return endYear - planted;
  }

  // ── POPUP ────────────────────────────────────────────────────────────────────
  function buildPopup(tree) {
    // Returns a line "Label: <b>Value</b> suffix" or '' if value is empty.
    const row = (label, value, suffix = '') =>
      value ? `<div class="prop"><b>${esc(label)}:</b> <span>${esc(value)}${suffix ? ' ' + suffix : ''}</span></div>` : '';

    const age = calcAge(tree);
    const ageSuffix = age !== null ? `(Age: ${age})` : '';

    let html = `<div class="tree-popup">`;
    const treeRef = (tree['Ref'] || '').replace(/'/g, '\\\'');
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">` +
      `<h4 style="margin-bottom:0">${esc(tree['Scientific name'] || '(unknown)')}</h4>` +
      `<button onclick="copyTreeLink('${treeRef}')" title="Copy link to this tree" style="flex-shrink:0;background:none;border:none;padding:0;cursor:pointer;color:#2a7ae2;display:flex;align-items:center">` +
        `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>` +
      `</button>` +
    `</div>`;

    const photos = parsePhotos(tree['Photo']);
    if (photos.length) {
      html += `<div class="photos">`;
      const photosAttr = JSON.stringify(photos).replace(/"/g, '&quot;');
      photos.forEach((raw, i) => {
        const thumb = googlePhotoUrl(raw, 'w280');
        html += `<a href="#" data-photos="${photosAttr}" data-index="${i}" onclick="openLightbox(JSON.parse(this.dataset.photos), +this.dataset.index); return false;"><img src="${thumb}" loading="lazy" referrerpolicy="no-referrer" alt="Tree photo"/></a>`;
      });
      html += `</div>`;
    }
    html += row('Common name',      tree['Common name']);
    html += row('Other names',      tree['Other names']);
    html += row('Year planted',     tree['Year planted'],     tree['Year planted']     ? ageSuffix : '');
    html += row('Est. year planted',tree['Est. year planted'],tree['Est. year planted'] ? ageSuffix : '');
    html += row('Year died',        tree['Year died']);
    html += row('Form',             tree['Form']);
    html += row('Condition',        tree['Condition']);
    html += row('Height',           tree['Height']);
    html += row('Notes',            tree['Notes']);


    const tags = parseTags(tree['Tag']);
    if (tags.length) html += row('Tags', tags.join(', '));
    html += row('Ref',              tree['Ref']);
    html += row('FCF number',       tree['FCF number']);

    const links = [];
    if (tree['FCF URL'])    links.push(`<a href="${tree['FCF URL']}"    target="_blank" rel="noopener">FCF</a>`);
    if (tree['Wikipedia'])  links.push(`<a href="${tree['Wikipedia']}"  target="_blank" rel="noopener">Wikipedia</a>`);
    if (tree['TSO'])        links.push(`<a href="${tree['TSO']}"        target="_blank" rel="noopener">TSO</a>`);
    if (tree['Latitude'] && tree['Longitude']) links.push(`<a href="https://maps.google.com/?q=${tree['Latitude']},${tree['Longitude']}" target="_blank" rel="noopener">Google Maps</a>`);
    const ref = tree['Ref'] || '';
    const formId = `ff-${ref.replace(/\./g, '-')}`;
    const sciName = (tree['Scientific name'] || '').replace(/'/g, '&#39;');
    const mailSubject = encodeURIComponent(`Feedback on tree ${ref} (${tree['Scientific name'] || ''})`);
    const mailtoHref = `mailto:info@fulhamcemeteryfriends.org.uk?subject=${mailSubject}`;
    const feedback = `<a class="feedback-link" href="#" onclick="toggleFeedbackForm('${formId}'); return false;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Feedback</a>`;
    html += `<div class="links"><span>${links.join(' &bull; ')}</span>${feedback}</div>`;
    html += `<div class="feedback-form" id="${formId}" data-ref="${ref}" data-tree="${sciName}">
      <textarea rows="3" placeholder="Your comment about this tree…"></textarea>
      <div class="feedback-actions">
        <button onclick="submitFeedback('${ref}', this.closest('.feedback-form'))">Send</button>
        <span class="feedback-status"></span>
        <a href="${mailtoHref}" style="margin-left:auto;font-size:11px;color:#2a7ae2;text-decoration:none;white-space:nowrap;">&#9993; Send email instead</a>
      </div>
    </div>`;

    html += '</div>';
    return html;
  }

  // ── FILTERS ──────────────────────────────────────────────────────────────────
  const isNewTag = tag => /\bnew\b/i.test(tag);

  function buildFilters(trees) {
    const sciCounts = {}, commonCounts = {}, shortCounts = {};
    const tagCounts = {}, newTagCounts = {}, condCounts = {}, formCounts = {};

    for (const tree of trees) {
      const sci   = tree['Scientific name'];
      const com   = tree['Common name'];
      const short = tree['Short name'];
      const cond  = tree['Condition'];
      const form  = tree['Form'];
      if (sci)   sciCounts[sci]     = (sciCounts[sci]     || 0) + 1;
      if (com)   commonCounts[com]  = (commonCounts[com]  || 0) + 1;
      if (short) shortCounts[short] = (shortCounts[short] || 0) + 1;
      if (cond)  condCounts[cond]   = (condCounts[cond]   || 0) + 1;
      if (form)  formCounts[form]   = (formCounts[form]   || 0) + 1;
      for (const tag of parseTags(tree['Tag'])) {
        if (isNewTag(tag)) newTagCounts[tag] = (newTagCounts[tag] || 0) + 1;
        else               tagCounts[tag]    = (tagCounts[tag]    || 0) + 1;
      }
    }

    const fillSelect = (id, counts) => {
      const sel = document.getElementById(id);
      for (const [name, count] of Object.entries(counts).sort()) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = `${name} (${count})`;
        sel.appendChild(opt);
      }
    };

    const fillCheckboxes = (id, counts, cls) => {
      const div = document.getElementById(id);
      for (const [val, count] of Object.entries(counts).sort()) {
        const lbl = document.createElement('label');
        lbl.className = 'checkbox-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = cls;
        cb.value = val;
        cb.addEventListener('change', applyFilters);
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(` ${val} (${count})`));
        div.appendChild(lbl);
      }
    };

    fillSelect('filter-sci', sciCounts);
    fillSelect('filter-common', commonCounts);
    fillSelect('filter-short', shortCounts);
    fillCheckboxes('filter-new-tags', newTagCounts, 'filter-tag');
    fillCheckboxes('filter-tags',     tagCounts,    'filter-tag');
    fillCheckboxes('filter-conditions', condCounts, 'filter-condition');
    fillCheckboxes('filter-forms',      formCounts, 'filter-form');

    const nonNativeCount = trees.filter(t => {
      const tags = (t['Tag'] || '').split(',').map(s => s.trim()).filter(Boolean);
      return !tags.some(tag => /\bnative\b/i.test(tag));
    }).length;
    // Insert Non-native checkbox directly after the Native checkbox
    const nativeCb = [...document.querySelectorAll('#filter-tags .filter-tag')]
      .find(cb => /\bnative\b/i.test(cb.value));
    if (nativeCb) {
      const lbl = document.createElement('label');
      lbl.className = 'checkbox-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'filter-non-native';
      cb.addEventListener('change', applyFilters);
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(` Non-native (${nonNativeCount})`));
      nativeCb.closest('label').after(lbl);
    }
  }

  // ── SEASONAL INTEREST FILTER ─────────────────────────────────────────────────
  const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTH_KEYS = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const currentMonthIdx = new Date().getMonth();

  (function buildMonthGrid() {
    const grid = document.getElementById('filter-months');
    MONTHS.forEach((mon, i) => {
      const lbl = document.createElement('label');
      lbl.className = 'month-btn' + (i === currentMonthIdx ? ' current' : '');
      lbl.title = mon;
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = mon;
      cb.addEventListener('change', () => handleMonthFilter(cb));
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(MONTH_KEYS[i]));
      grid.appendChild(lbl);
    });
  })();

  function handleMonthFilter(cb) {
    document.querySelectorAll('#filter-months input').forEach(other => {
      if (other !== cb) { other.checked = false; other.closest('.month-btn').classList.remove('selected'); }
    });
    cb.closest('.month-btn').classList.toggle('selected', cb.checked);
    applyFilters();
  }

  function getSelectedMonth() {
    return document.querySelector('#filter-months input:checked')?.value || null;
  }

  function matchesFilters(tree) {
    const sciFilter    = document.getElementById('filter-sci').value;
    const commonFilter = document.getElementById('filter-common').value;
    const shortFilter  = document.getElementById('filter-short').value;
    const checkedTags  = [...document.querySelectorAll('.filter-tag:checked')].map(cb => cb.value);
    const checkedConds = [...document.querySelectorAll('.filter-condition:checked')].map(cb => cb.value);
    const checkedForms = [...document.querySelectorAll('.filter-form:checked')].map(cb => cb.value);
    const infoOnly     = document.getElementById('filter-info').checked;

    if (sciFilter    && tree['Scientific name'] !== sciFilter)    return false;
    if (commonFilter && tree['Common name']     !== commonFilter) return false;
    if (shortFilter  && tree['Short name']      !== shortFilter)  return false;
    if (checkedTags.length) {
      const treeTags = parseTags(tree['Tag']);
      if (!checkedTags.some(t => treeTags.includes(t))) return false;
    }
    if (checkedConds.length && !checkedConds.includes(tree['Condition'])) return false;
    if (checkedForms.length && !checkedForms.includes(tree['Form']))      return false;
    if (infoOnly && !tree['Info label']) return false;
    if (document.getElementById('filter-photo').checked    &&  !tree['Photo']) return false;
    if (document.getElementById('filter-no-photo').checked &&   tree['Photo']) return false;
    if (document.getElementById('filter-non-native').checked) {
      const tags = (tree['Tag'] || '').split(',').map(s => s.trim()).filter(Boolean);
      if (tags.some(tag => /\bnative\b/i.test(tag))) return false;
    }
    const selectedMonth = getSelectedMonth();
    if (selectedMonth) {
      const months = (tree['Months'] || '').split(',').map(m => m.trim());
      if (!months.includes(selectedMonth)) return false;
    }
    return true;
  }

  function updateLabels() {
    const bounds = map.getBounds();
    let inView = 0;
    markers.forEach((marker) => {
      if (map.hasLayer(marker) && bounds.contains(marker.getLatLng())) inView++;
    });
    const labelThreshold = window.innerWidth <= 767 ? 10 : 40;
    const showLabels = document.getElementById('filter-show-labels').checked &&
                       (map.getZoom() >= 21 || inView < labelThreshold);
    markers.forEach((marker) => {
      if (!map.hasLayer(marker)) return;
      const tooltip = marker.getTooltip();
      if (!tooltip) return;
      if (showLabels && !tooltip.isOpen()) marker.openTooltip();
      else if (!showLabels && tooltip.isOpen()) marker.closeTooltip();
    });
  }

  function applyFilters() {
    let count = 0;
    markers.forEach((marker, tree) => {
      const show = matchesFilters(tree);
      if (show) {
        if (!map.hasLayer(marker)) marker.addTo(map);
        count++;
      } else {
        if (map.hasLayer(marker)) marker.remove();
        const tooltip = marker.getTooltip();
        if (tooltip && tooltip.isOpen()) marker.closeTooltip();
      }
    });
    document.getElementById('tree-count').textContent =
      `${count} tree${count !== 1 ? 's' : ''} shown`;
    updateLabels();
  }

  function buildFilterUrl() {
    const params = new URLSearchParams();
    const sci   = document.getElementById('filter-sci').value;
    const common = document.getElementById('filter-common').value;
    const short  = document.getElementById('filter-short').value;
    if (sci)    params.set('sci',    sci);
    if (common) params.set('common', common);
    if (short)  params.set('short',  short);
    const tags  = [...document.querySelectorAll('.filter-tag:checked')].map(cb => cb.value);
    const conds = [...document.querySelectorAll('.filter-condition:checked')].map(cb => cb.value);
    const forms = [...document.querySelectorAll('.filter-form:checked')].map(cb => cb.value);
    if (tags.length)  params.set('tags', tags.join(','));
    if (conds.length) params.set('cond', conds.join(','));
    if (forms.length) params.set('form', forms.join(','));
    if (document.getElementById('filter-info').checked)      params.set('info',     '1');
    if (document.getElementById('filter-photo').checked)     params.set('photo',    '1');
    if (document.getElementById('filter-no-photo').checked)  params.set('nophoto',  '1');
    if (document.getElementById('filter-non-native').checked)  params.set('nonnative',   '1');
    if (document.getElementById('filter-show-labels').checked) params.set('showlabels', '1');
    const month = getSelectedMonth();
    if (month) params.set('month', month);
    if (map.hasLayer(baseLayers['Satellite']))  params.set('satellite', '1');
    if (map.hasLayer(sectionLayer))             params.set('sections',  '1');
    if (pathsLayer && map.hasLayer(pathsLayer)) params.set('paths',     '1');
    const base = window.location.origin + window.location.pathname;
    return params.toString() ? `${base}?${params}` : base;
  }

  function showToast(msg) {
    const toast = document.getElementById('add-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function copyFilterLink() {
    navigator.clipboard.writeText(buildFilterUrl()).then(() => showToast('Filter link copied to clipboard'));
  }

  function copyTreeLink(ref) {
    const url = new URL(buildFilterUrl());
    url.searchParams.set('ref', ref);
    navigator.clipboard.writeText(url.toString()).then(() => showToast('Tree link copied to clipboard'));
  }

  function applyUrlFilters() {
    const params = new URLSearchParams(window.location.search);
    if (!params.toString()) return;
    const sci = params.get('sci');     if (sci)    document.getElementById('filter-sci').value    = sci;
    const common = params.get('common'); if (common) document.getElementById('filter-common').value = common;
    const short  = params.get('short');  if (short)  document.getElementById('filter-short').value  = short;
    if (params.has('tags')) {
      const tags = params.get('tags').split(',');
      document.querySelectorAll('.filter-tag').forEach(cb => { if (tags.includes(cb.value)) cb.checked = true; });
    }
    if (params.has('cond')) {
      const conds = params.get('cond').split(',');
      document.querySelectorAll('.filter-condition').forEach(cb => { if (conds.includes(cb.value)) cb.checked = true; });
    }
    if (params.has('form')) {
      const forms = params.get('form').split(',');
      document.querySelectorAll('.filter-form').forEach(cb => { if (forms.includes(cb.value)) cb.checked = true; });
    }
    if (params.get('info')      === '1') document.getElementById('filter-info').checked      = true;
    if (params.get('photo')     === '1') document.getElementById('filter-photo').checked     = true;
    if (params.get('nophoto')   === '1') document.getElementById('filter-no-photo').checked  = true;
    if (params.get('nonnative')   === '1') document.getElementById('filter-non-native').checked  = true;
    if (params.get('showlabels') === '1') document.getElementById('filter-show-labels').checked = true;
    if (params.has('month')) {
      const cb = document.querySelector(`#filter-months input[value="${params.get('month')}"]`);
      if (cb) { cb.checked = true; cb.closest('.month-btn').classList.add('selected'); }
    }
    if (params.get('satellite') === '1') { baseLayers['Street map'].remove(); baseLayers['Satellite'].addTo(map); }
    if (params.get('sections')  === '1') sectionLayer.addTo(map);
    // paths=1 is handled inside the KML fetch callback (layer loads asynchronously)
    applyFilters();
  }

  function resetFilters() {
    document.getElementById('filter-sci').selectedIndex   = 0;
    document.getElementById('filter-common').selectedIndex = 0;
    document.getElementById('filter-short').selectedIndex  = 0;
    document.querySelectorAll('.filter-tag, .filter-condition, .filter-form, #filter-info, #filter-photo, #filter-no-photo, #filter-non-native, #filter-show-labels')
      .forEach(el => { el.checked = false; });
    document.querySelectorAll('#filter-months input').forEach(cb => { cb.checked = false; });
    document.querySelectorAll('.month-btn').forEach(el => el.classList.remove('selected'));
    applyFilters();
  }

  function togglePanel() {

  // ── MAP SETUP ────────────────────────────────────────────────────────────────

    {name:'16',  coords:[[51.480576,-0.2154365],[51.4805526,-0.2154821],[51.4805176,-0.2155116],[51.4804775,-0.2155224],[51.4803438,-0.2154848],[51.4803539,-0.21534]]},

  function polygonCentroid(coords) {
    return [
      coords.reduce((s, c) => s + c[0], 0) / coords.length,
      coords.reduce((s, c) => s + c[1], 0) / coords.length
    ];
  }

  const sectionLayer = L.layerGroup(
    SECTIONS.flatMap(sec => {
      const poly = L.polygon(sec.coords, {
        color: '#555',
        weight: 1.5,
        dashArray: '4 3',
        fillColor: '#888',
        fillOpacity: 0.15,
        interactive: false
      });
      const label = L.marker(polygonCentroid(sec.coords), {
        icon: L.divIcon({
          className: 'section-label',
          html: sec.name,
          iconSize: null
        }),
        interactive: false
      });
      return [poly, label];
    })
  );

  const map = L.map('map');
  baseLayers['Street map'].addTo(map);
  const layerControl = L.control.layers(baseLayers, { 'Section layout': sectionLayer }, { position: 'bottomleft' }).addTo(map);

  // ── KML LAYER ────────────────────────────────────────────────────────────────
  let pathsLayer = null;
  fetch('Paths%20and%20structures%20(edited).kml')
    .then(r => r.text())
    .then(text => {
      const kml = new DOMParser().parseFromString(text, 'text/xml');
      const group = L.layerGroup();
      pathsLayer = group;
      kml.querySelectorAll('Placemark').forEach(pm => {
        const name      = pm.querySelector('name')?.textContent?.trim() || '';
        const styleUrl  = pm.querySelector('styleUrl')?.textContent?.trim().replace(/^#/, '') || '';
        const pointEl   = pm.querySelector('Point coordinates');
        const lineEl    = pm.querySelector('LineString coordinates');

        if (pointEl) {
          const [lng, lat] = pointEl.textContent.trim().split(',').map(Number);
          L.marker([lat, lng], { icon: kmlPointIcon(styleUrl) })
            .bindPopup(`<b>${name}</b>`)
            .addTo(group);
        } else if (lineEl) {
          const coords = lineEl.textContent.trim().split(/\s+/).map(c => {
            const [lng, lat] = c.split(',').map(Number);
            return [lat, lng];
          }).filter(([lat, lng]) => !isNaN(lat) && !isNaN(lng));
          L.polyline(coords, { color: kmlLineColor(styleUrl), weight: 9, opacity: 0.85 })
            .bindPopup(`<b>${name}</b>`)
            .addTo(group);
        }
      });
      layerControl.addOverlay(group, 'Paths &amp; structures');
      if (new URLSearchParams(window.location.search).get('paths') === '1') group.addTo(map);
    })
    .catch(err => console.warn('KML load failed:', err));

  // Map<treeObject, L.Marker>
  const markers = new Map();

  // ── DATA LOADING ─────────────────────────────────────────────────────────────
  async function loadData() {
    document.getElementById('tree-count').textContent = 'Loading…';

    let text;
    try {
      const resp = await fetch(CSV_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      text = await resp.text();
    } catch (err) {
      document.getElementById('tree-count').textContent = 'Failed to load data';
      console.error('Could not fetch tree data:', err);
      return;
    }

    const rows = parseCSV(text);
    if (rows.length < 2) {
      document.getElementById('tree-count').textContent = 'No data found';
      return;
    }

    const headers = rows[0].map(h => h.trim());
    const trees = rows.slice(1)
      .map(row => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
        return obj;
      })
      .filter(t => {
        const lat = parseFloat(t['Latitude']);
        const lng = parseFloat(t['Longitude']);
        return !isNaN(lat) && !isNaN(lng);
      });

    const colourMap = buildColourMap(trees);
    const bounds = [];

    for (const tree of trees) {
      const lat = parseFloat(tree['Latitude']);
      const lng = parseFloat(tree['Longitude']);
      const colour = colourMap.get(tree['Scientific name']) || '#888888';
      const icon   = makeIcon(tree, colour);
      const marker = L.marker([lat, lng], { icon });
      marker.bindPopup(buildPopup(tree), { maxWidth: 320 });
      const sci = tree['Scientific name'] || '';
      const com = tree['Common name'] || '';
      const labelHtml = `<span class="lbl-sci">${sci}</span>${com ? `<span class="lbl-com">${com}</span>` : ''}`;
      marker.bindTooltip(labelHtml, { permanent: true, direction: 'right', className: 'tree-label', opacity: 1, offset: [8, 0] });
      marker.on('mouseover', () => {
        const el = document.getElementById('hover-label');
        el.innerHTML = labelHtml;
        el.classList.add('visible');
      });
      marker.on('mouseout', () => {
        document.getElementById('hover-label').classList.remove('visible');
      });
      marker.addTo(map);
      markers.set(tree, marker);
      bounds.push([lat, lng]);
    }

    if (bounds.length) map.fitBounds(bounds, { padding: [24, 24] });
    updateLabels();

    buildFilters(trees);
    applyUrlFilters();

    // Open popup for a specific tree if ?ref= is in the URL
    const refParam = new URLSearchParams(window.location.search).get('ref');
    if (refParam) {
      for (const [tree, marker] of markers) {
        if (tree['Ref'] === refParam) {
          map.setView(marker.getLatLng(), Math.max(map.getZoom(), 18));
          marker.openPopup();
          break;
        }
      }
    }

    document.getElementById('tree-count').textContent =
      `${trees.length} tree${trees.length !== 1 ? 's' : ''} shown`;
  }

  loadData();
  // Open panel by default on desktop only
  if (window.innerWidth > 767) {
    const panel  = document.getElementById('panel');
    const toggle = document.getElementById('panel-toggle');
    panel.classList.add('open');
    toggle.textContent = '\u25b6 Filters';
  }

  // ── LIGHTBOX ─────────────────────────────────────────────────────────────────
  let lbPhotos = [], lbIndex = 0;

  function openLightbox(photos, index) {
    lbPhotos = photos;
    lbIndex  = index;
    showLightboxPhoto();
    document.getElementById('lightbox').classList.add('open');
  }

  function showLightboxPhoto() {
    const raw   = lbPhotos[lbIndex];
    const large = googlePhotoUrl(raw, 'w1600');
    const img = document.getElementById('lightbox-img');
    img.classList.remove('zoomed');
    document.getElementById('lightbox').classList.add('loading');
    img.src = large;
    document.getElementById('lightbox').classList.remove('zoomed');
    document.getElementById('lightbox-open').href = raw;
    document.getElementById('lightbox-prev').disabled = lbIndex === 0;
    document.getElementById('lightbox-next').disabled = lbIndex === lbPhotos.length - 1;
    // Hide nav buttons when there's only one photo
    const showNav = lbPhotos.length > 1;
    document.getElementById('lightbox-prev').style.visibility = showNav ? '' : 'hidden';
    document.getElementById('lightbox-next').style.visibility = showNav ? '' : 'hidden';
  }

  function toggleLightboxZoom(e) {
    e.stopPropagation();
    const img = document.getElementById('lightbox-img');
    const lb  = document.getElementById('lightbox');
    const zooming = !img.classList.contains('zoomed');
    img.classList.toggle('zoomed', zooming);
    lb.classList.toggle('zoomed', zooming);
  }

  function stepLightbox(dir) {
    lbIndex = Math.max(0, Math.min(lbPhotos.length - 1, lbIndex + dir));
    showLightboxPhoto();
  }

  function closeLightbox() {
    const img = document.getElementById('lightbox-img');
    img.classList.remove('zoomed');
    document.getElementById('lightbox').classList.remove('open', 'zoomed');
    img.src = '';
  }

  function handleLightboxClick(e) {
    // Close if clicking the backdrop (not the image or controls)
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  stepLightbox(-1);
    if (e.key === 'ArrowRight') stepLightbox(1);
  });

  // ── FEEDBACK FORM ────────────────────────────────────────────────────────────
  const FEEDBACK_URL = 'https://script.google.com/macros/s/AKfycby5n5Ti9g7f-Jo2iK5IiWxIjXrsupMhA-D_4Cs0_8rfxmICJRT76HT3a4_i7LFEqHg/exec';

  function doSubmitFeedback(ref, tree, comment, btn, status, textarea, onSuccess) {
    btn.disabled = true;
    status.textContent = 'Sending…';
    fetch(FEEDBACK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ ref, tree, comment })
    }).then(() => {
      status.textContent = 'Sent — thank you!';
      textarea.value = '';
      btn.disabled = false;
      if (onSuccess) onSuccess();
    }).catch(() => {
      status.textContent = 'Failed to send. Please try again.';
      btn.disabled = false;
    });
  }

  function toggleFeedbackForm(id) {
    const form = document.getElementById(id);
    if (!form) return;
    if (window.innerWidth <= 767) {
      openFeedbackSheet(form.dataset.ref, form.dataset.tree);
    } else {
      form.classList.toggle('open');
      if (form.classList.contains('open')) form.querySelector('textarea').focus();
    }
  }

  // Desktop inline form submit
  function submitFeedback(ref, formEl) {
    const textarea = formEl.querySelector('textarea');
    const status   = formEl.querySelector('.feedback-status');
    const btn      = formEl.querySelector('button');
    const comment  = textarea.value.trim();
    if (!comment) return;
    doSubmitFeedback(ref, formEl.dataset.tree || '', comment, btn, status, textarea, null);
  }

  // Mobile bottom sheet
  function openFeedbackSheet(ref, sciName) {
    const sheet = document.getElementById('feedback-sheet');
    sheet.dataset.ref  = ref;
    sheet.dataset.tree = sciName;
    document.getElementById('feedback-sheet-title').textContent = sciName || ref;
    sheet.querySelector('textarea').value = '';
    sheet.querySelector('.feedback-status').textContent = '';
    const mailSubject = encodeURIComponent(`Feedback on tree ${ref} (${sciName})`);
    document.getElementById('feedback-sheet-mailto').href =
      `mailto:info@fulhamcemeteryfriends.org.uk?subject=${mailSubject}`;
    document.getElementById('feedback-backdrop').classList.add('open');
    sheet.classList.add('open');
    setTimeout(() => sheet.querySelector('textarea').focus(), 320);
  }

  function closeFeedbackSheet() {
    document.getElementById('feedback-sheet').classList.remove('open');
    document.getElementById('feedback-backdrop').classList.remove('open');
  }

  function submitFeedbackSheet() {
    const sheet   = document.getElementById('feedback-sheet');
    const textarea = sheet.querySelector('textarea');
    const status  = sheet.querySelector('.feedback-status');
    const btn     = sheet.querySelector('button');
    const comment = textarea.value.trim();
    if (!comment) return;
    doSubmitFeedback(
      sheet.dataset.ref, sheet.dataset.tree, comment, btn, status, textarea,
      () => setTimeout(closeFeedbackSheet, 1500)
    );
  }

  map.on('popupclose', closeFeedbackSheet);
  map.on('zoomend moveend', updateLabels);

  // ── ADD MODE ─────────────────────────────────────────────────────────────────
  let addModeActive = false;
  let toastTimer    = null;

  function toggleAddMode() {
    addModeActive ? cancelAddMode() : enterAddMode();
  }

  function enterAddMode() {
    addModeActive = true;
    document.getElementById('map').classList.add('add-mode');
    document.getElementById('btn-add').classList.add('active');
    document.getElementById('btn-add').lastChild.textContent = ' Cancel (or press Esc)';
    if (window.innerWidth <= 767) {
      const panel = document.getElementById('panel');
      if (panel.classList.contains('open')) togglePanel();
    }
    showToast('Click or tap on the map to copy coordinates to clipboard');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => document.getElementById('add-toast').classList.remove('show'), 4000);
  }

  function exitAddMode() {
    addModeActive = false;
    document.getElementById('map').classList.remove('add-mode');
    const btn = document.getElementById('btn-add');
    btn.classList.remove('active');
    btn.lastChild.textContent = ' Copy location coords';
  }

  function cancelAddMode() {
    if (addMarker) { map.removeLayer(addMarker); addMarker = null; }
    exitAddMode();
  }

  let addMarker = null;

  const addMarkerIcon = L.divIcon({
    className: '',
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="4" fill="rgba(192,57,43,0.2)"/>
      <line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/>
    </svg>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
  });

  map.on('click', e => {
    if (!addModeActive) return;
    const lat = e.latlng.lat.toFixed(7);
    const lng = e.latlng.lng.toFixed(7);
    if (addMarker) map.removeLayer(addMarker);
    addMarker = L.marker(e.latlng, { icon: addMarkerIcon, interactive: false }).addTo(map);
    navigator.clipboard.writeText(`${lat}\t${lng}`).then(() => {
      showToast(`Copied: ${lat}, ${lng}`);
      exitAddMode();
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && addModeActive) cancelAddMode();
  });

  // ── USER LOCATION ────────────────────────────────────────────────────────────
  if ('geolocation' in navigator) {
    let locationDot      = null;
    let accuracyCircle   = null;

    navigator.geolocation.watchPosition(pos => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      const latlng = [lat, lng];

      if (!locationDot) {
        accuracyCircle = L.circle(latlng, {
          radius: accuracy,
          color: '#4a90e2',
          fillColor: '#4a90e2',
          fillOpacity: 0.1,
          weight: 1,
          interactive: false
        }).addTo(map);

        locationDot = L.circleMarker(latlng, {
          radius: 8,
          color: 'white',
          weight: 2,
          fillColor: '#4a90e2',
          fillOpacity: 1,
          interactive: false
        }).addTo(map);
      } else {
        locationDot.setLatLng(latlng);
        accuracyCircle.setLatLng(latlng).setRadius(accuracy);
      }
    }, null, { enableHighAccuracy: true });
  }
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
